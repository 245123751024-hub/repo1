<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonBot</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

* {
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* Chat Container */
.chat-container {
  width: 360px;
  height: 520px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.chat-header {
  padding: 1rem;
  background: linear-gradient(90deg, #ff00cc, #3333ff);
  font-weight: 800;
  text-align: center;
  letter-spacing: 0.5px;
}

/* Messages */
.chat-messages {
  flex: 1;
  padding: 1rem;
  overflow-y: auto;
}

.message {
  margin-bottom: 0.8rem;
  padding: 0.7rem 1rem;
  border-radius: 14px;
  max-width: 80%;
  font-size: 0.9rem;
  line-height: 1.4;
}

.bot {
  background: rgba(255,255,255,0.15);
  align-self: flex-start;
}

.user {
  background: linear-gradient(90deg, #00ffe0, #00bcd4);
  color: #002b2b;
  align-self: flex-end;
}

/* Input */
.chat-input {
  display: flex;
  padding: 0.7rem;
  gap: 0.5rem;
  background: rgba(0,0,0,0.25);
}

.chat-input input {
  flex: 1;
  padding: 0.7rem 1rem;
  border-radius: 999px;
  border: none;
  outline: none;
}

.chat-input button {
  border: none;
  padding: 0 1.2rem;
  border-radius: 999px;
  cursor: pointer;
  background: linear-gradient(90deg, #ff0080, #7928ca);
  color: white;
  font-weight: 600;
  transition: transform 0.2s;
}

.chat-input button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">🤖 NeonBot</div>

  <div class="chat-messages" id="messages">
    <div class="message bot">Hey. I’m NeonBot. Say something chaotic.</div>
  </div>

  <div class="chat-input">
    <input type="text" id="input" placeholder="Type a message…" />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("input");

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  // Fake bot response (replace with real API later)
  setTimeout(() => {
    addMessage("I heard: \"" + text + "\" 👀", "bot");
  }, 600);
}

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = `message ${sender}`;
  msg.textContent = text;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
