version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nodecons
    ports:
      - "8081:8081"
    restart: always
    environment:
      - NODE_ENV=production
    volumes:
      - ./public:/app/public
      - ./studregnode.js:/app/studregnode.js
